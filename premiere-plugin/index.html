<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      color-scheme: dark;
      background: #0d0d0f;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body,
    #syncXShell,
    #syncXWebView {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      overflow: hidden;
      background: #0d0d0f;
      color: #f4f4f5;
      font-family: system-ui, sans-serif;
    }

    #syncXWebView {
      display: block;
      border: 0;
    }

    #shellError {
      display: none;
      position: absolute;
      inset: 0;
      padding: 24px;
      align-items: center;
      justify-content: center;
      background: #0d0d0f;
    }

    #shellError.visible {
      display: flex;
    }

    .shell-error-card {
      width: 100%;
      max-width: 360px;
      padding: 18px;
      border: 1px solid #34343a;
      border-radius: 12px;
      background: #18181b;
    }

    .shell-error-card strong {
      display: block;
      margin-bottom: 8px;
      font-size: 15px;
    }

    .shell-error-card p {
      margin: 0;
      color: #b5b5bd;
      font-size: 12px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div id="syncXShell">
    <webview
      id="syncXWebView"
      src="plugin:/webview/index.html"
      width="100%"
      height="100%"
      uxpAllowInspector="true"
    ></webview>
    <div id="shellError" role="alert">
      <div class="shell-error-card">
        <strong>Sync-X could not open its interface</strong>
        <p id="shellErrorMessage">Reload the plugin from UXP Developer Tool. Sync-X requires Premiere Pro 25.6 or newer.</p>
      </div>
    </div>
  </div>

  <script src="lib/server.js"></script>
  <script src="lib/storage.js"></script>
  <script src="lib/premiere.js"></script>
  <script src="host/state.js"></script>
  <script src="host/controller.js"></script>
</body>
</html>
